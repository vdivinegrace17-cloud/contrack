{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Forgot Password? — ConTrack{% endblock %}

{% block main %}
<div class="auth-wrapper">
  <div class="auth-card card-accent-purple">

    <h4 class="mb-1 fw-bold">Forgot Password?</h4>
    <p class="text-muted small mb-4">
      Enter your email address and we'll send you a link to reset your password.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-ct-purple w-100 mt-2">Send Reset Link</button>
    </form>

    <hr class="my-3">

    <div class="text-center small">
      <a href="{% url 'accounts:merchant_login' %}">Back to login</a>
    </div>

  </div>
</div>
{% endblock %}
