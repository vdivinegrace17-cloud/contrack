{% extends 'base.html' %}

{% block title %}Check Your Inbox — ConTrack{% endblock %}

{% block main %}
<div class="auth-wrapper">
  <div class="auth-card card-accent-purple">

    <h4 class="mb-1 fw-bold">Check Your Inbox</h4>
    <p class="text-muted small mb-4">Reset link sent.</p>

    <p class="small">
      If an account exists with that email address, we've sent a password reset link.
      Check your inbox (and spam folder).
    </p>

    <hr class="my-3">

    <div class="text-center small">
      <a href="{% url 'accounts:merchant_login' %}">Back to login</a>
    </div>

  </div>
</div>
{% endblock %}
