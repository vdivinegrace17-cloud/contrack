{% extends 'base.html' %}
{% block title %}Upload Floor Plan — ConTrack{% endblock %}

{% block main %}
<div class="ct-dashboard-wrapper">
  {% include 'partials/organizer_sidebar.html' %}
  <div class="ct-dashboard-main">
    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="{% url 'organizer:event_list' %}" class="text-muted text-decoration-none" style="font-size:0.875rem;">← Events</a>
      <span class="text-muted">/</span>
      <h4 class="fw-bold mb-0" style="color:var(--ct-purple-dark);">Upload Floor Plan — {{ event.title }}</h4>
    </div>
    <div class="ct-card" style="max-width:560px;">
      <p class="text-muted">Floor plan upload form coming soon.</p>
    </div>
  </div>
</div>
{% endblock %}
