{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Event — ConTrack Organizer{% endblock %}

{% block main %}
<div class="ct-dashboard-wrapper">
  {% include 'partials/organizer_sidebar.html' %}

  <div class="ct-dashboard-main">
    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="{% url 'organizer:event_list' %}" class="text-muted text-decoration-none" style="font-size:0.875rem;">
        ← Events
      </a>
      <span class="text-muted">/</span>
      <h4 class="fw-bold mb-0" style="color:var(--ct-purple-dark);">{{ action }} Event</h4>
    </div>

    <div class="ct-card" style="max-width:720px;">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-ct-yellow">
            {% if action == 'Create' %}Create Event{% else %}Save Changes{% endif %}
          </button>
          <a href="{% url 'organizer:event_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
