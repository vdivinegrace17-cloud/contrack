{% load static %}
<nav class="ct-sidebar d-flex flex-column">
  <a class="sidebar-brand" href="{% url 'merchant:dashboard' %}">
    <span style="color:var(--ct-yellow)">C</span>onTrack
  </a>

  {% with view_name=request.resolver_match.view_name %}

  <a href="{% url 'merchant:dashboard' %}"
     class="{% if view_name == 'merchant:dashboard' %}active{% endif %}">
    <i class="bi bi-house me-2"></i>Dashboard
  </a>

  <a href="{% url 'merchant:event_list' %}"
     class="{% if 'event' in view_name %}active{% endif %}">
    <i class="bi bi-search me-2"></i>Browse Events
  </a>

  <a href="{% url 'merchant:reservations' %}"
     class="{% if 'reservation' in view_name %}active{% endif %}">
    <i class="bi bi-clipboard-check me-2"></i>My Reservations
  </a>

  <a href="{% url 'notifications:inbox' %}"
     class="{% if 'notifications' in view_name %}active{% endif %}">
    <i class="bi bi-bell me-2"></i>Notifications
    {% if unread_count %}<span class="badge bg-danger ms-1" style="font-size:0.65rem;">{{ unread_count }}</span>{% endif %}
  </a>

  <div class="sidebar-divider"></div>

  <a href="{% url 'merchant:profile' %}"
     class="{% if view_name == 'merchant:profile' %}active{% endif %}">
    <i class="bi bi-person me-2"></i>Profile
  </a>

  <a href="{% url 'accounts:logout' %}">
    <i class="bi bi-box-arrow-right me-2"></i>Logout
  </a>

  {% endwith %}
</nav>
