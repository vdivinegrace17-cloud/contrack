{% load static %}
<nav class="ct-sidebar d-flex flex-column">
  <a class="sidebar-brand" href="{% url 'organizer:dashboard' %}">
    <span style="color:var(--ct-yellow)">C</span>onTrack <span style="font-weight:400;font-size:0.8rem;opacity:0.75;">Organizer</span>
  </a>

  {% with view_name=request.resolver_match.view_name %}

  <a href="{% url 'organizer:dashboard' %}"
     class="{% if view_name == 'organizer:dashboard' %}active{% endif %}">
    <i class="bi bi-speedometer2 me-2"></i>Dashboard
  </a>

  <a href="{% url 'organizer:event_list' %}"
     class="{% if 'event' in view_name %}active{% endif %}">
    <i class="bi bi-calendar-event me-2"></i>Events
  </a>

  <a href="{% url 'organizer:reservation_list' %}"
     class="{% if 'reservation' in view_name or 'application' in view_name %}active{% endif %}">
    <i class="bi bi-clipboard-check me-2"></i>Reservations
  </a>

  <a href="{% url 'organizer:payment_settings' %}"
     class="{% if 'payment_settings' in view_name or 'payment_method' in view_name %}active{% endif %}">
    <i class="bi bi-gear me-2"></i>Payment Settings
  </a>

  <a href="{% url 'organizer:merchant_list' %}"
     class="{% if 'merchant' in view_name %}active{% endif %}">
    <i class="bi bi-people me-2"></i>Merchants
  </a>

  <div class="sidebar-divider"></div>

  <a href="{% url 'organizer:profile' %}"
     class="{% if view_name == 'organizer:profile' %}active{% endif %}">
    <i class="bi bi-person me-2"></i>Profile
  </a>

  <a href="{% url 'accounts:logout' %}">
    <i class="bi bi-box-arrow-right me-2"></i>Logout
  </a>

  {% endwith %}
</nav>
